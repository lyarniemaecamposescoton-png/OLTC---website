<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OLTC - Login</title>
    
    <link rel="stylesheet" href="style.css">

    <style>
        body.login-page {
            /* This creates the green/yellow background you want */
            background: linear-gradient(135deg, #2e7d32 0%, #fdd835 100%) !important;
            height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
        }

        .login-card {
            background: white;
            padding: 35px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-align: center;
            width: 350px;
        }

        /* This fixes the "Too Big" logo issue */
        .logo {
            width: 120px !important;
            height: auto !important;
            margin: 0 auto 15px !important;
            display: block !important;
        }

        /* This forces the inputs to be one per line */
        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
            display: block;
            box-sizing: border-box; /* Keeps the boxes from going outside the white card */
        }

        .btn-login {
            background: #2e7d32;
            color: white;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
    </style>
</head>
<body class="login-page">

    <div class="login-card">
        <img src="logo.jpg" alt="OLTC Logo" class="logo">
        
        <h1>OLTC</h1>
        <p>Ormoc Liner Transport Cooperative</p>
        
        <form action="dashboard.html">
            <input type="text" placeholder="Username" required>
            <input type="password" placeholder="Password" required>
            <button type="submit" class="btn-login">Access Dashboard</button>
        </form>
    </div>

</body>
</html>
