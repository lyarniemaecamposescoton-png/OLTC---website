<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cojibas Monitoring - OLTC</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dashboard-page">

    <nav class="navbar">
        <h2>OLTC Admin</h2>
        <div>
            <a href="dashboard.html" class="logout" style="margin-right: 20px;">Dashboard</a>
            <a href="login.html" class="logout">Logout</a>
        </div>
    </nav>

    <div class="container" style="max-width: 1200px;">
        <header class="dashboard-header">
            <h1>🚛 Cojibas Monitoring</h1>
            <p>Tracking truck assignments and departmental expenses.</p>
        </header>

        <div class="table-controls">
            <input type="text" id="cojibasSearch" placeholder="Search Plate or Name..." style="width: 300px; margin-bottom: 0;">
            <button class="btn-login" style="width: auto; padding: 10px 25px;">+ Add Entry</button>
        </div>

        <div class="table-container">
            <table class="medical-table">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Plate Number</th>
                        <th>Date</th>
                        <th>Department</th>
                        <th>Amount</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>Juan Dela Cruz</td>
                        <td><strong>ABC-1234</strong></td>
                        <td>Oct 24, 2024</td>
                        <td>Logistics</td>
                        <td>₱5,000.00</td>
                        <td><button class="edit-btn">Edit</button></td>
                    </tr>
                    <tr>
                        <td>Maria Santos</td>
                        <td><strong>XYZ-5678</strong></td>
                        <td>Oct 23, 2024</td>
                        <td>Operations</td>
                        <td>₱3,200.00</td>
                        <td><button class="edit-btn">Edit</button></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
